##############################################################################
# Nginx Site Config — venqore.com (VenQore SaaS)
#
# Phase 8 — Production Server Setup
#
# This file handles BOTH the main domain (venqore.com) and ALL tenant
# subdomains (*.venqore.com) from a single server block.
#
# TenantMiddleware extracts the subdomain and resolves the tenant from DB.
#
# Install:
#   sudo cp venqore.conf /etc/nginx/sites-available/venqore.com
#   sudo ln -s /etc/nginx/sites-available/venqore.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL:
#   sudo certbot --nginx -d venqore.com -d "*.venqore.com" \
#     --dns-cloudflare --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini
#
##############################################################################

# Redirect HTTP → HTTPS (all hosts)
server {
    listen 80;
    listen [::]:80;
    server_name venqore.com *.venqore.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/venqore/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server (main domain + all tenant subdomains)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # Wildcard cert from Let's Encrypt via Cloudflare DNS challenge
    server_name venqore.com *.venqore.com;

    root /var/www/venqore/public;
    index index.php index.html;

    # ── SSL (managed by Certbot) ──────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/venqore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/venqore.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ─────────────────────────────────────────
    add_header X-Frame-Options               "SAMEORIGIN"     always;
    add_header X-Content-Type-Options        "nosniff"        always;
    add_header X-XSS-Protection             "1; mode=block"  always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;

    # ── Performance ──────────────────────────────────────────────
    client_max_body_size 100M;   # Allow large file uploads (product images, imports)
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain application/json application/javascript text/css
               application/xml text/javascript application/x-javascript;
    gzip_min_length 256;

    # ── Static Assets — Long Cache ────────────────────────────────
    location ~* \.(ico|css|js|gif|jpe?g|png|svg|woff2?|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri @php;
    }

    # ── Laravel Application ───────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /index.php {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Increase timeout for long-running requests (imports, reports)
        fastcgi_read_timeout 120;
        fastcgi_send_timeout 120;
        fastcgi_connect_timeout 30;

        # Performance buffers
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 16k;
        fastcgi_busy_buffers_size 256k;
    }

    # Block access to hidden files and sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(storage|bootstrap/cache) {
        deny all;
    }

    # ── Logging ───────────────────────────────────────────────────
    access_log /var/log/nginx/venqore.access.log combined;
    error_log  /var/log/nginx/venqore.error.log warn;

    @php {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
    }
}
