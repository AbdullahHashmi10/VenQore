<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenQore Station - Loading</title>
    <style>
        :root {
            --accent: #6366f1;
            --bg: #020617;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "Outfit", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .logo-container {
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }

        .logo-img {
            width: 120px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.3));
        }

        .loader-ring {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.9;
            }
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            margin: 0 0 8px 0;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            font-size: 14px;
            margin: 0 0 40px 0;
            font-weight: 500;
        }

        .status-text {
            font-family: 'Consolas', 'Monaco', monospace;
            color: #475569;
            font-size: 10px;
            min-height: 20px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .progress-container {
            width: 280px;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #818cf8);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <img src="assets/icon.png" alt="VenQore Logo" class="logo-img">
    </div>

    <div class="loader-ring"></div>

    <h1>VenQore Station</h1>
    <p>Connecting to system core...</p>

    <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
    </div>
    <div class="status-text" id="status">Initializing...</div>

    <script>
        const statusEl = document.getElementById('status');
        const progressEl = document.getElementById('progress');

        // System managed loading sequence
        let p = 0;
        const interval = setInterval(() => {
            // Pulse the bar to show activity, but wait for Main Process to finish boot
            if (p < 90) p += Math.random() * 5;
            progressEl.style.width = p + '%';
        }, 200);
    </script>
</body>

</html>
